name: test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  check:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
      - name: Check sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Rust & Cache
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Setup Flutter & Cache
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Test tools (svg_generator)
        working-directory: tools/svg_generator
        run: uv run pytest

      - name: Install MDD CLI
        run: cargo install mdd_api

      - name: Prepare MDD and MIL data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tmp_data
          cd tmp_data
          
          # Download MDD.zip
          curl -L -o MDD.zip https://github.com/mammaldiversity/mammaldiversity.github.io/raw/master/assets/data/MDD.zip
          
          # Download latest MIL tar.gz from github releases
          echo "Downloading latest .tar.gz from asm-mil release"
          gh release download -R mammaldiversity/asm-mil -p "*.tar.gz" --clobber
          
          MIL_FILENAME=$(ls *.tar.gz | head -n 1)
          MIL_DIRNAME="${MIL_FILENAME%.tar.gz}"
          echo "MIL_DIRNAME=$MIL_DIRNAME" >> $GITHUB_ENV
          
          # Run the new prepare subcommand to unpack MDD and merge with MIL data
          mdd prepare -z MDD.zip -m "$MIL_FILENAME" -o .
          
          # Move prepared output to expected mil.json
          mv mil_mdd.json mil.json
          
          # Extract images so they can be moved/verified downstream
          tar -xzf "$MIL_FILENAME"

      - name: Move MIL to assets
        working-directory: tmp_data
        run: |
          IMAGES_DIR="$MIL_DIRNAME/images-540px-webp"
          mkdir -p ../assets/mil-images
          find "$IMAGES_DIR" -name "*.webp" -exec mv {} ../assets/mil-images/ \;
          mkdir -p ../assets/data
          find . -name "mil.json" -exec mv {} ../assets/data/mil.json \;

      - name: Verify mil.json exists
        run: |
          if [ ! -f assets/data/mil.json ]; then
            echo "Error: mil.json not found in assets/data"
            exit 1
          fi
          echo "mil.json found in assets/data"
          
      - name: Cleanup temporary data
        run: rm -rf tmp_data

      - name: Flutter lint & test
        run: |
          flutter pub get
          flutter analyze
          flutter test