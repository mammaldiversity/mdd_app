name: test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  check:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    steps:
      - name: Check sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python tools
        run: uv pip install mil-kit --system

      - name: Setup Rust & Cache
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - name: Setup Flutter & Cache
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Test tools (svg_generator)
        working-directory: tools/svg_generator
        run: uv run pytest

      - name: Install MDD CLI
        run: cargo install mdd_api

      - name: Extract MDD data
        working-directory: assets/data
        run: |
          curl -L -o MDD.zip https://github.com/mammaldiversity/mammaldiversity.github.io/raw/master/assets/data/MDD.zip
          mdd unpack -i MDD.zip

      - name: Extract MIL data
        working-directory: assets/data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading latest .tar.gz from asm-mil release"
          gh release download -R mammaldiversity/asm-mil -p "*.tar.gz" --clobber
          
          # Grab the downloaded filename
          MIL_FILENAME=$(ls *.tar.gz | head -n 1)
          MIL_DIRNAME="${MIL_FILENAME%.tar.gz}"
          
          echo "Extraction info:"
          echo "FILENAME: $MIL_FILENAME"
          echo "DIRNAME: $MIL_DIRNAME"
          
          tar -xzf "$MIL_FILENAME"
          
          MDD_FILE=$(ls MDD/MDD_v*.csv)
          MIL_DATE="${MIL_DIRNAME#mil-v}"
          MIL_BASE_DATE=$(echo "$MIL_DATE" | sed 's/\.[0-9]*$//')
          
          echo "Processing MIL data using MDD file $MDD_FILE"
          mil-kit mdd \
            --mil-file "$MIL_DIRNAME/metadata/mil-$MIL_BASE_DATE.xlsx" \
            --mdd-file "$MDD_FILE" \
            --mil-img-dir "$MIL_DIRNAME/images-540px-webp" \
            --output mil

          echo "MIL_DIRNAME=$MIL_DIRNAME" >> $GITHUB_ENV

      - name: Move MIL to assets
        working-directory: assets/data
        run: |
          IMAGES_DIR="$MIL_DIRNAME/images-540px-webp"
          mkdir -p ../mil-images
          find "$IMAGES_DIR" -name "*.webp" -exec mv {} ../mil-images/ \;
          find . -name "mil.json" -exec mv {} mil.json \;

      - name: Verify mil.json exists
        run: |
          if [ ! -f assets/data/mil.json ]; then
            echo "Error: mil.json not found in assets/data"
            exit 1
          fi
          echo "mil.json found in assets/data"

      - name: Flutter lint & test
        run: |
          flutter pub get
          flutter analyze
          flutter test