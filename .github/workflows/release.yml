name: releases

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      matrix:
        os: ["windows-latest", "ubuntu-latest"]
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mil-kit
        run: pip install mil-kit

      - name: Install MDD CLI
        run: cargo install mdd_api

      - name: Extract MDD data
        working-directory: assets/data
        run: |
          curl -L -o MDD.zip https://github.com/mammaldiversity/mammaldiversity.github.io/raw/master/assets/data/MDD.zip
          mdd unpack -i MDD.zip

      - name: Extract MIL data
        working-directory: assets/data
        run: |
          MIL_URL=$(curl -s https://api.github.com/repos/mammaldiversity/asm-mil/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*\.tar\.gz"' \
            | grep -o 'https://[^"]*')
          MIL_FILENAME=$(basename "$MIL_URL")
          MIL_DIRNAME="${MIL_FILENAME%.tar.gz}"
          echo "Downloading MIL data from $MIL_URL"
          curl -L -o "$MIL_FILENAME" "$MIL_URL"
          echo "Extracting $MIL_FILENAME to $MIL_DIRNAME"
          tar -xzf "$MIL_FILENAME"
          MDD_FILE=$(ls MDD/MDD_v*.csv)
          MIL_DATE="${MIL_DIRNAME#mil-v}"
          MIL_BASE_DATE=$(echo "$MIL_DATE" | sed 's/\.[0-9]*$//')
          echo "MIL_DIRNAME=$MIL_DIRNAME" >> $GITHUB_ENV
          echo "Processing MIL data using MDD file $MDD_FILE"
          mil-kit mdd \
            --mil-file "$MIL_DIRNAME/metadata/mil-$MIL_BASE_DATE.xlsx" \
            --mdd-file "$MDD_FILE" \
            --mil-img-dir "$MIL_DIRNAME/images-540px-webp" \
            --output mil

      - name: Copy MIL images to assets
        working-directory: assets/data
        run: |
          IMAGES_DIR="$MIL_DIRNAME/images-540px-webp"
          mkdir -p ../mil-images
          find "$IMAGES_DIR" -name "*.webp" -exec mv {} ../mil-images/ \;

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - run: |
          flutter pub get
          flutter analyze

      - name: Build
        uses: subosito/flutter-action@v2
      - if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release
          flutter build apk --release --split-per-abi

      - if: ${{ matrix.os == 'windows-latest' }}
        run: |
          flutter build windows --release

      - name: Compress Linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          echo "Compressing files..."
          mkdir mdd
          mv build/linux/x64/release/bundle/* mdd
          tar -czvf mdd.tar.gz mdd

      - name: Compress Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "Creating folder..."
          mkdir mdd
          echo "Compressing files..."
          mv build\windows\x64\runner\Release\* mdd
          powershell Compress-Archive -Path mdd -DestinationPath mdd.zip

      - name: Upload linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: mdd.tar.gz
          asset_name: mdd-Linux-x86_64.tar.gz
          tag: ${{ github.ref_name }}

      - name: Upload android
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/apk/release/*.apk
          tag: ${{ github.ref_name }}
          overwrite: true
          file_glob: true

      - name: Upload windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: mdd.zip
          asset_name: mdd-Windows-x86_64.zip
          tag: ${{ github.ref_name }}
