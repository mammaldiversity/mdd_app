name: releases

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      matrix:
        os: ["windows-latest", "ubuntu-latest"]
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install mil-kit
        run: pip install mil-kit

      - name: Install MDD CLI
        run: cargo install mdd_api

      - name: Extract MDD data
        run: |
          mkdir -p tmp_data
          cd tmp_data
          curl -L -o MDD.zip https://github.com/mammaldiversity/mammaldiversity.github.io/raw/master/assets/data/MDD.zip
          mdd unpack -i MDD.zip

      - name: Extract MIL data
        working-directory: tmp_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading latest .tar.gz from asm-mil release"
          gh release download -R mammaldiversity/asm-mil -p "*.tar.gz" --clobber
          
          # Grab the downloaded filename
          MIL_FILENAME=$(ls *.tar.gz | head -n 1)
          MIL_DIRNAME="${MIL_FILENAME%.tar.gz}"
          
          echo "Extracting $MIL_FILENAME to $MIL_DIRNAME"
          tar -xzf "$MIL_FILENAME"
          
          MDD_FILE=$(ls MDD/MDD_v*.csv)
          MIL_DATE="${MIL_DIRNAME#mil-v}"
          MIL_BASE_DATE=$(echo "$MIL_DATE" | sed 's/\.[0-9]*$//')
          
          echo "MIL_DIRNAME=$MIL_DIRNAME" >> $GITHUB_ENV
          echo "Processing MIL data using MDD file $MDD_FILE"
          
          mil-kit mdd \
            --mil-file "$MIL_DIRNAME/metadata/mil-$MIL_BASE_DATE.xlsx" \
            --mdd-file "$MDD_FILE" \
            --mil-img-dir "$MIL_DIRNAME/images-540px-webp" \
            --output mil
      
      - name: Move MIL images and verify
        working-directory: tmp_data
        run: |
          mkdir -p ../assets/mil-images
          find "$MIL_DIRNAME/images-540px-webp" -name "*.webp" -exec mv {} ../assets/mil-images/ \;
          if [ ! -d ../assets/mil-images ]; then
            echo "Error: assets/mil-images not found"
            exit 1
          fi
          echo "Images moved successfully"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          
      - run: |
          flutter pub get
          flutter analyze

      - name: Generate SQLite Database
        run: |
          # Copy to expected 'data/' folder for the script
          mkdir -p data
          cp tmp_data/MDD.zip data/MDD.zip
          cp tmp_data/mil.json data/mil.json || true
          mkdir -p assets/data
          cp tmp_data/mil.json assets/data/mil.json || true
          ./tools/generate_prefilled_db.sh

      - name: Cleanup temporary data
        run: |
          echo "Removing unneeded source files to reduce app size"
          rm -rf tmp_data
          rm -rf data
          
      - run: |
          flutter pub get
          flutter analyze

      - name: Build Linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          flutter build linux --release

      - name: Build Debian Package
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "master" ] || [ "$VERSION" = "main" ]; then
            VERSION="1.0.0"
          fi
          echo "Packaging Version: $VERSION"
          
          # Structure Debian package
          mkdir -p debian-pkg/DEBIAN
          mkdir -p debian-pkg/opt/mdd
          mkdir -p debian-pkg/usr/bin
          mkdir -p debian-pkg/usr/share/applications
          mkdir -p debian-pkg/usr/share/icons/hicolor/512x512/apps
          
          # Copy bundle, desktop launcher and icon files
          cp -r build/linux/x64/release/bundle/* debian-pkg/opt/mdd/
          cp packaging/mdd.desktop debian-pkg/usr/share/applications/
          cp assets/icons/favicon512.png debian-pkg/usr/share/icons/hicolor/512x512/apps/mdd.png
          
          # Create wrapper/symlink
          ln -sf /opt/mdd/mdd debian-pkg/usr/bin/mdd
          
          # Write control file
          cat <<EOF > debian-pkg/DEBIAN/control
Package: mdd
Version: ${VERSION}
Section: utils
Priority: optional
Architecture: amd64
Depends: libc6, libglib2.0-0, libgtk-3-0, liblzma5, libstdc++6
Maintainer: Mammal Diversity Database <contact@mammaldiversity.org>
Description: Mammal Diversity Database desktop application.
EOF
          
          dpkg-deb --build --root-owner-group debian-pkg mdd_${VERSION}_amd64.deb

      - name: Build RPM Package
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "master" ] || [ "$VERSION" = "main" ]; then
            VERSION="1.0.0"
          fi
          
          sudo apt-get update && sudo apt-get install -y rpm
          
          # Structure rpmbuild directory
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpmbuild/SOURCES/bundle
          cp -r build/linux/x64/release/bundle/* rpmbuild/SOURCES/bundle/
          cp packaging/mdd.desktop rpmbuild/SOURCES/
          cp assets/icons/favicon512.png rpmbuild/SOURCES/
          
          # Write RPM SPEC file
          cat <<EOF > rpmbuild/SPECS/mdd.spec
Name:           mdd
Version:        ${VERSION}
Release:        1%{?dist}
Summary:        Mammal Diversity Database desktop application
License:        MIT
URL:            https://github.com/mammaldiversity/mdd_app

%description
Mammal Diversity Database desktop application.

%prep
# Prebuilt bundle, no prep needed

%install
rm -rf \$RPM_BUILD_ROOT
mkdir -p \$RPM_BUILD_ROOT/opt/mdd
mkdir -p \$RPM_BUILD_ROOT/usr/bin
mkdir -p \$RPM_BUILD_ROOT/usr/share/applications
mkdir -p \$RPM_BUILD_ROOT/usr/share/icons/hicolor/512x512/apps

cp -r %{_sourcedir}/bundle/* \$RPM_BUILD_ROOT/opt/mdd/
cp %{_sourcedir}/favicon512.png \$RPM_BUILD_ROOT/usr/share/icons/hicolor/512x512/apps/mdd.png
cp %{_sourcedir}/mdd.desktop \$RPM_BUILD_ROOT/usr/share/applications/mdd.desktop

ln -sf /opt/mdd/mdd \$RPM_BUILD_ROOT/usr/bin/mdd

%files
/opt/mdd/
/usr/bin/mdd
/usr/share/applications/mdd.desktop
/usr/share/icons/hicolor/512x512/apps/mdd.png

%changelog
EOF
          
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/mdd.spec
          cp rpmbuild/RPMS/x86_64/mdd-${VERSION}-1.x86_64.rpm ./mdd-${VERSION}-1.x86_64.rpm

      - name: Update Snapcraft version
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "master" ] || [ "$VERSION" = "main" ]; then
            VERSION="1.0.0"
          fi
          sed -i "s/version: '1.0.0'/version: '$VERSION'/g" snap/snapcraft.yaml

      - name: Build Snap
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: snapcore/action-build@v1
        id: build-snap

      - name: Upload Snap Artifact
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: mdd-snap
          path: ${{ steps.build-snap.outputs.snap }}

      
      - name: Build Android
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          flutter build apk --release --split-per-abi
          cd build/app/outputs/apk/release
          for f in app-*.apk; do
            if [ -f "$f" ]; then
              mv "$f" "${f/app/mdd}"
            fi
          done
          
      - if: ${{ matrix.os == 'windows-latest' }}
        run: |
          flutter build windows --release

      - name: Compress Linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          echo "Compressing files..."
          mkdir mdd
          mv build/linux/x64/release/bundle/* mdd
          tar -czvf mdd-Linux-x86_64.tar.gz mdd

      - name: Compress Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "Creating folder..."
          mkdir mdd
          echo "Compressing files..."
          mv build/windows/x64/runner/Release/* mdd
          powershell Compress-Archive -Path mdd -DestinationPath mdd-Windows-x86_64.zip

      - name: Extract Release Notes
        run: |
          awk '/^## Installation/{flag=1; next} /^## /{flag=0} flag' README.md > release_notes.md

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: |
            mdd-Linux-x86_64.tar.gz
            mdd-Windows-x86_64.zip
            build/app/outputs/apk/release/*.apk
            *.deb
            *.rpm
          fail_on_unmatched_files: false